# ci-cd.yml — Automated testing, deployment, and scheduled ingestion pipeline
#
# WHAT THIS FILE DOES:
# Two triggers run this file:
#
#   1. ON PUSH to main:
#      a. Spin up a fresh Ubuntu machine (free, provided by GitHub)
#      b. Install Python and run all 11 pytest tests
#      c. If tests pass → SSH into EC2 and deploy the new code
#      d. If tests fail → Stop. Don't deploy broken code.
#
#   2. ON SCHEDULE (daily at 8am UTC):
#      a. Call POST /ingest on the live server
#      b. Log the response (rows ingested, alerts fired)
#      c. This is what makes SENTINEL a real automated pipeline —
#         data flows every day without anyone touching a keyboard.
#
# WHERE THIS FILE LIVES:
# .github/workflows/ is a special folder GitHub watches.
# Any .yml file in here becomes an automated workflow.
#
# SECRETS USED (stored in GitHub repo settings, never in code):
#   EC2_SSH_KEY → our private SSH key to log into the server
#   EC2_HOST    → the server's IP address (52.23.231.90)
#   EC2_USER    → "ubuntu" (the Linux user on our EC2 instance)
#   API_KEY     → the secret key required to call POST /ingest

# Pattern: Multiple Workflow Triggers
# This workflow responds to TWO different events:
#
#   push → runs when you push code to main (test + deploy)
#   schedule → runs on a timer every day (just ingestion)
#
# The cron string '0 8 * * *' is standard Unix cron syntax:
#   field 1: minute (0)     → at the top of the hour
#   field 2: hour   (8)     → 8am UTC (3am US Eastern, midnight US Pacific)
#   field 3: day    (*)     → every day of the month
#   field 4: month  (*)     → every month
#   field 5: weekday(*)     → every day of the week
# So: '0 8 * * *' = 8:00am UTC, every single day
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'
  # Pattern: Manual Trigger (workflow_dispatch)
  # Adding this enables the "Run workflow" button in the GitHub Actions UI.
  # Without it, the workflow can only be triggered by push or schedule.
  # We use this for testing the ingest job without waiting for 8am UTC.
  workflow_dispatch:

# Use Node.js 24 for all actions (avoids deprecation warning for Node.js 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: TEST — Run pytest on a GitHub-provided machine
  # ──────────────────────────────────────────────
  test:
    # GitHub gives us a free Ubuntu VM. It spins up, runs our steps,
    # then gets destroyed. We never manage this machine.
    runs-on: ubuntu-latest

    steps:
      # Pattern: Pre-built Action (uses:)
      # "actions/checkout@v4" is a reusable action made by GitHub.
      # It downloads our repo code onto the runner machine.
      - name: Check out code
        uses: actions/checkout@v4

      # Install Python 3.11 on the runner.
      # We pick a specific version so tests are consistent every time.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Same as running "pip install -r requirements.txt" on your laptop.
      # Installs FastAPI, SQLAlchemy, pytest, etc.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run all 10 tests. If ANY test fails, this step fails,
      # and the entire job is marked as failed — blocking deployment.
      # DATABASE_URL and API_KEY are needed because app modules read them at import time.
      # FRED_API_KEY is needed because fred_client.py now validates it at startup too.
      # Tests mock the actual external calls, so these values don't need to be real —
      # they just need to exist so startup checks don't raise RuntimeError.
      - name: Run tests
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          API_KEY: test-key
          FRED_API_KEY: fake-fred-key
        run: pytest tests/ -v

  # ──────────────────────────────────────────────
  # Job 2: DEPLOY — SSH into EC2 and update the running app
  # ──────────────────────────────────────────────
  deploy:
    # Pattern: Job Dependency (needs:)
    # "needs: test" means this job ONLY runs if the test job passed.
    # If pytest fails, deploy is skipped — the server stays on the working version.
    needs: test
    runs-on: ubuntu-latest

    # Only deploy from the main branch (extra safety check)
    if: github.ref == 'refs/heads/main'

    steps:
      # Pattern: SSH from CI/CD (write key → scan host fingerprint → SSH in → clean up)
      # The private key is stored as a GitHub Secret — never in code.
      - name: Set up SSH key
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > deploy_key
          # SSH refuses to use keys with loose permissions — 600 = owner read/write only
          chmod 600 deploy_key
          # Pattern: SSH Host Verification
          # ssh-keyscan asks the server "what is your fingerprint?" and adds it
          # to the known_hosts file. SSH then verifies the fingerprint on the actual
          # connection. This replaces StrictHostKeyChecking=no — we now CHECK the
          # host, we just do it automatically instead of storing it manually.
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          # Write deploy commands to a script file, then pipe it into SSH.
          # This avoids quoting/escaping issues between YAML, shell, and SSH.
          cat > deploy.sh << 'EOF'
          cd SENTINEL
          git pull origin main
          source venv/bin/activate
          pip install -r requirements.txt
          pkill -f uvicorn || true
          nohup venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
          sleep 3
          curl -s http://localhost:8000/health
          EOF
          ssh -i deploy_key "$EC2_USER@$EC2_HOST" bash < deploy.sh

      - name: Clean up SSH key
        if: always()
        run: rm -f deploy_key

  # ──────────────────────────────────────────────
  # Job 3: INGEST — Run the pipeline on a daily schedule
  # ──────────────────────────────────────────────
  ingest:
    # Pattern: Conditional Job Trigger
    # This job ONLY runs on the schedule trigger — not on every push.
    # Without this condition, it would also run on every push to main,
    # which would waste FRED API calls and obscure the deployment logs.
    #
    # github.event_name is a built-in variable GitHub sets automatically:
    #   'push'             → someone pushed code
    #   'schedule'         → the cron timer fired
    #   'workflow_dispatch'→ someone clicked "Run workflow" in the UI
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      # Pattern: Call a secured HTTP endpoint from CI
      # The API key is stored as a GitHub Secret — never in the YAML.
      # curl flags used here:
      #   -s           → silent mode (no progress bar cluttering the log)
      #   -w "\n"      → print a newline after the response body (clean formatting)
      #   -X POST      → use HTTP POST method
      #   -H           → add a header to the request
      #   --fail-with-body → if HTTP status is 4xx or 5xx, exit with error code
      #                      This makes the CI step fail visibly instead of
      #                      succeeding silently on a bad response.
      - name: Trigger daily ingestion
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Triggering SENTINEL ingestion pipeline..."
          curl -s -w "\n" \
            --fail-with-body \
            -X POST "http://$EC2_HOST:8000/ingest" \
            -H "X-API-Key: $API_KEY"
          echo "Ingestion complete."
          # The response printed above shows rows ingested + any alerts.
          # Click into this step in GitHub Actions to see the daily run history.
